services:
  spacebot:
    image: ghcr.io/spacedriveapp/spacebot:latest
    container_name: spacebot
    restart: unless-stopped
    ports:
      - "19898:19898"
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    cap_add:
      - SYS_ADMIN
    volumes:
      - ${SPACEBOT_DATA:-./data}:/data
    # environment:
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional:
      # - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}

  # Optional - configure spacebot via a convenient web browser UI
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    volumes:
      - ${SPACEBOT_DATA:-./data}:/srv
    ports:
      - "8080:80"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional MCP Servers — enable with: docker compose --profile mcp up -d
  # ---------------------------------------------------------------------------

